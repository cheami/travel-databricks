# This is a Databricks asset bundle definition for travel_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: travel_bundle
  uuid: b47c720f-5c5a-4618-b9e0-5b00218cec4b

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-61fb5c94-e1d3.cloud.databricks.com
    variables:
      catalog: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-61fb5c94-e1d3.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/cheami90@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/cheami90@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prod
    permissions:
      - user_name: cheami90@gmail.com
        level: CAN_MANAGE
