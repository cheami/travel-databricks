# The main pipeline for ingest_data_etl

resources:
  pipelines:
    ingest_data_etl:
      name: ingest_data_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/ingest_data_etl"

      libraries:
        - glob:
            include: ../src/ingest_data_etl/transformations/**

      environment:
        dependencies:
          - --editable ${workspace.file_path}
